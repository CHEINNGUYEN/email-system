{% extends "base.html" %}

{% block page_title %}Thêm liên hệ mới{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title mb-0">
                    <i class="bi bi-person-plus-fill me-2 text-primary-custom"></i>Thông tin liên hệ
                </h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Địa chỉ Email <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" id="email" name="email"
                               placeholder="example@email.com" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="first_name" class="form-label">Tên</label>
                            <input type="text" class="form-control" id="first_name" name="first_name"
                                   placeholder="Nhập tên">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="last_name" class="form-label">Họ</label>
                            <input type="text" class="form-control" id="last_name" name="last_name"
                                   placeholder="Nhập họ">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="company" class="form-label">Công ty</label>
                        <input type="text" class="form-control" id="company" name="company"
                               placeholder="Tên công ty (không bắt buộc)">
                    </div>
                    <div class="mb-4">
                        <label for="phone" class="form-label">Số điện thoại</label>
                        <input type="tel" class="form-control" id="phone" name="phone"
                               placeholder="0912 345 678">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1">
                            <i class="bi bi-check-circle-fill"></i> Thêm liên hệ
                        </button>
                        <a href="{{ url_for('contacts') }}" class="btn btn-outline-primary">
                            <i class="bi bi-x-circle"></i> Hủy
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
