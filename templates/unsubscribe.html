<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đã hủy đăng ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg: #f8fafc;
            --text: #1e293b;
            --primary: #4f46e5;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .unsubscribe-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .success-icon {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="unsubscribe-card">
        <div class="success-icon">
            <i class="bi bi-check-circle-fill"></i>
        </div>
        <h2 class="mb-3">Đã hủy đăng ký thành công</h2>
        <p class="text-muted mb-4">
            Chúng tôi đã xóa email <strong>{{ contact.email }}</strong> khỏi danh sách gửi thư. 
            Bạn sẽ không còn nhận được các email tiếp thị từ chúng tôi.
        </p>
        <p class="small text-secondary">
            Nếu đây là một sự nhầm lẫn, vui lòng liên hệ với quản trị viên.
        </p>
    </div>
</body>
</html>
