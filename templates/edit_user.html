{% extends "base.html" %}

{% block page_title %}Chỉnh sửa người dùng{% endblock %}

{% block content %}
<div class="mb-3">
    <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">← Quay lại danh sách</a>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Chỉnh sửa: {{ user.username }}</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Tên người dùng *</label>
                        <input type="text" class="form-control" id="username" name="username" value="{{ user.username }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">Email *</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Mật khẩu mới (để trống nếu không đổi)</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Nhập mật khẩu mới">
                    </div>
                    
                    <div class="mb-3">
                        <label for="role" class="form-label">Vai trò *</label>
                        <select class="form-select" id="role" name="role" required>
                            <option value="employee" {{ 'selected' if user.role == 'employee' else '' }}>Employee</option>
                            <option value="admin" {{ 'selected' if user.role == 'admin' else '' }}>Admin</option>
                        </select>
                    </div>
                    
                    <div class="mb-3 text-muted">
                        <small>Ngày tạo: {{ user.created_at.strftime('%d/%m/%Y %H:%M') if user.created_at else 'N/A' }}</small>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Cập nhật</button>
                    <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">Hủy</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
